name: Release Binaries

on:
  push:
    tags:
      - 'v*'  # Triggers on version tags like v2.6.1

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Needed for git info in version.h

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Rename binary
        run: |
          chmod +x build/bin/sad
          mv build/bin/sad sad-${{ github.ref_name }}-macos-x64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sad-macos-x64
          path: sad-${{ github.ref_name }}-macos-x64

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Rename binary
        run: |
          move build\bin\Release\sad.exe sad-${{ github.ref_name }}-windows-x64.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sad-windows-x64
          path: sad-${{ github.ref_name }}-windows-x64.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Rename binary
        run: |
          chmod +x build/bin/sad
          mv build/bin/sad sad-${{ github.ref_name }}-linux-x64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sad-linux-x64
          path: sad-${{ github.ref_name }}-linux-x64

  create-release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/sad-macos-x64/*
            artifacts/sad-windows-x64/*
            artifacts/sad-linux-x64/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
